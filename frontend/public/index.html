<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#F5C542" />
        <meta name="description" content="A judgment-free community for Australian parents. Real conversations, day and night." />

        <!-- PWA -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <!-- iOS home screen -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="The Village" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />

        <!-- Android -->
        <meta name="mobile-web-app-capable" content="yes" />

        <!-- Open Graph -->
        <meta property="og:title" content="The Village" />
        <meta property="og:description" content="A judgment-free community for Australian parents. Real conversations, day and night." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ourlittlevillage.au" />
        <meta property="og:image" content="https://ourlittlevillage.au/logo.png" />
        <meta property="og:site_name" content="The Village" />
        <meta property="og:locale" content="en_AU" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="The Village" />
        <meta name="twitter:description" content="A judgment-free community for Australian parents. Real conversations, day and night." />
        <meta name="twitter:image" content="https://ourlittlevillage.au/logo.png" />

        <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <title>The Village</title>
        <script>
          (function() {
            // Resolve theme — new key 'village.theme' (day/night/auto), falls back to legacy 'theme' (dark/light)
            var stored = localStorage.getItem('village.theme') || localStorage.getItem('theme');
            var isDark = stored === 'night' || stored === 'dark' ||
                         (!stored && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
            var theme = (stored === 'day' || stored === 'light') ? 'day' : (isDark ? 'night' : 'day');
            document.documentElement.setAttribute('data-theme', theme);
            if (isDark) document.documentElement.classList.add('dark');
          })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
