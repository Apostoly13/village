<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
        <meta name="theme-color" content="#F5C542" />
        <meta name="description" content="A judgment-free community for Australian parents. Real conversations, day and night." />

        <!-- PWA -->
        <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

        <!-- iOS home screen -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="The Village" />
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />

        <!-- Android -->
        <meta name="mobile-web-app-capable" content="yes" />

        <!-- Open Graph -->
        <meta property="og:title" content="The Village" />
        <meta property="og:description" content="A judgment-free community for Australian parents. Real conversations, day and night." />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://ourlittlevillage.au" />

        <link rel="icon" type="image/png" href="%PUBLIC_URL%/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <title>The Village</title>
        <script>
          (function() {
            var stored = localStorage.getItem('theme');
            if (!stored) {
              document.documentElement.classList.add('dark');
              localStorage.setItem('theme', 'dark');
            } else if (stored === 'dark') {
              document.documentElement.classList.add('dark');
            }
          })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
