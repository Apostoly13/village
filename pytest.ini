[pytest]
testpaths = tests/api
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --no-header -p no:warnings
markers =
    auth: Authentication tests
    forums: Forum/post tests
    messages: Messaging tests
    events: Events tests
    marketplace: Marketplace tests
    admin: Admin/moderation tests
    security: Security boundary tests
    notifications: Notification tests
    anonymous: Anonymous posting tests
    slow: Tests that make multiple API calls
